<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="images/gradient-nerd-logo-template.png">
    <!-- =========>> link Fonts <<=============== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&family=Nerko+One&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- LOADER -->
    <div id="loader" class="loader-wrapper">
        <span class="custom-loader"></span>
    </div>

    <!-- MAIN GAMES SECTION -->
    <section id="gamesSection">
        <div class="hero">
            <div class="text-center z-2">
                <h1 class="display-3 mb-0">DISCOVER</h1>
                <p class="lead text-muted">Your next digital obsession starts here.</p>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg sticky-top">
            <div class="container">
                <a class="navbar-brand" href="#">GameVault GG</a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navContent">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navContent">
                    <ul class="navbar-nav ms-auto category-list">
                        <li class="nav-item"><a class="nav-link active" data-category="mmorpg">MMORPG</a></li>
                        <li class="nav-item"><a class="nav-link" data-category="shooter">Shooter</a></li>
                        <li class="nav-item"><a class="nav-link" data-category="sailing">Sailing</a></li>
                        <li class="nav-item"><a class="nav-link" data-category="permadeath">Permadeath</a></li>
                        <li class="nav-item"><a class="nav-link" data-category="superhero">Superhero</a></li>
                        <li class="nav-item"><a class="nav-link" data-category="pixel">Pixel</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container py-5">
            <div class="row g-4" id="gameGrid">
                <!-- Dynamic Content -->
            </div>
        </div>
    </section>

    <!-- DETAILS SECTION -->
    <section id="detailsSection" class="game-details-overlay d-none">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="mb-0">Game Intel</h2>
                <button id="closeBtn" class="btn btn-link text-white text-decoration-none">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="row g-5" id="detailsContent">
                <!-- Dynamic Content -->
            </div>
        </div>
    </section>


    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/main.js"> </script>
</body>

</html>
